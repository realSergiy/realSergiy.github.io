<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --heading: #f0f6fc;
      --muted: #8b949e;
      --accent: #58a6ff;
      --code-bg: #161b22;
    }

    * { box-sizing: border-box; }

    html { color-scheme: dark; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.7;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    h1, h2, h3, h4 {
      color: var(--heading);
      line-height: 1.25;
      margin-top: 2em;
      margin-bottom: 0.6em;
      font-weight: 600;
    }

    h1 { font-size: 2.2em; margin-top: 0; }
    h2 { font-size: 1.6em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    h3 { font-size: 1.3em; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    p { margin: 1em 0; }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1.5em auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5em 0;
    }

    code {
      font-family: "SFMono-Regular", "JetBrains Mono", Consolas, Menlo, monospace;
      font-size: 0.88em;
      background: rgba(110, 118, 129, 0.18);
      padding: 0.2em 0.4em;
      border-radius: 6px;
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      line-height: 1.5;
    }

    pre code {
      background: none;
      padding: 0;
      font-size: 0.85em;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.5em 0;
      font-size: 0.95em;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }

    th { background: var(--surface); color: var(--heading); }
    tr:nth-child(even) td { background: rgba(110, 118, 129, 0.06); }

    blockquote {
      margin: 1em 0;
      padding: 0 1em;
      color: var(--muted);
      border-left: 3px solid var(--border);
    }

    ul, ol { padding-left: 1.6em; }
    li { margin: 0.35em 0; }

    /* Rouge syntax highlighting — dark */
    .highlight .c, .highlight .cm, .highlight .c1, .highlight .cs { color: #8b949e; font-style: italic; }
    .highlight .k, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr, .highlight .kt { color: #ff7b72; }
    .highlight .s, .highlight .s1, .highlight .s2, .highlight .sb, .highlight .sc, .highlight .sd, .highlight .se, .highlight .sh, .highlight .si, .highlight .sx, .highlight .dl { color: #a5d6ff; }
    .highlight .nf, .highlight .nx { color: #d2a8ff; }
    .highlight .nc, .highlight .nn, .highlight .no { color: #ffa657; }
    .highlight .nb, .highlight .bp { color: #79c0ff; }
    .highlight .mi, .highlight .mf, .highlight .mh, .highlight .mo, .highlight .il { color: #79c0ff; }
    .highlight .o, .highlight .ow { color: #ff7b72; }
    .highlight .nv, .highlight .vi, .highlight .vg { color: #ffa657; }
    .highlight .gp { color: #8b949e; }
  </style>
</head>
<body>
  <main>
    {% if page.title %}<h1>{{ page.title }}</h1>{% endif %}
    {{ content }}
  </main>
</body>
</html>
